<html>
<head>
  <meta charset="UTF-8" />
  <title>GPT with Approval Demo</title>
  <style>
    body { font-family: sans-serif; margin: 10px; }
    #messages { border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: auto; }
    textarea { width: 100%; height: 60px; }
    .msg-user { color: blue; }
    .msg-bot { color: green; }
  </style>
</head>
<body>
  <h1>GPT with Approval (Test)</h1>

  <label>
    <input type="checkbox" id="allowWeb" />
    Allow web / generative mode (later)
  </label>

  <div id="messages"></div>

  <textarea id="input" placeholder="Type your message..."></textarea><br/>
  <button id="sendBtn">Send</button>

  <script>
    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const allowWebCheckbox = document.getElementById('allowWeb');

    function addMessage(text, cssClass) {
      const p = document.createElement('p');
      p.textContent = text;
      p.className = cssClass;
      messagesDiv.appendChild(p);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    sendBtn.onclick = async () => {
      const text = input.value.trim();
      if (!text) return;
      addMessage('You: ' + text, 'msg-user');
      input.value = '';

      const allowWeb = allowWebCheckbox.checked;

      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, allowWeb })
      });
      const data = await res.json();
      addMessage('Bot: ' + data.reply, 'msg-bot');
    };
  </script>
</body>
</html>
